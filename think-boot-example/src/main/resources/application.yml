server:
  port: 8080

spring:
  application:
    name: think-boot-example

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/think_boot_example?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: dev
      config:
        server-addr: localhost:8848
        namespace: dev
        file-extension: yml

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.thinkboot.example.model.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

thinkboot:
  auth:
    jwt:
      secret: dGhpbmstYm9vdC1qd3Qtc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmc=
      expiration: 7200000
      refresh-expiration: 604800000
      skip-paths:
        - /api/auth/login
        - /api/auth/register
        - /doc.html
        - /webjars/**
        - /swagger-resources/**
        - /v3/api-docs/**

knife4j:
  enable: true
  openapi:
    title: ThinkBoot Example API
    description: ThinkBoot Framework Example API Documentation
    version: 1.0.0
    contact:
      name: ThinkBoot
      email: admin@thinkboot.com
    license:
      name: Apache 2.0
      url: https://www.apache.org/licenses/LICENSE-2.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.thinkboot.example.controller

logging:
  level:
    com.thinkboot.example: debug
    com.thinkboot.example.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
