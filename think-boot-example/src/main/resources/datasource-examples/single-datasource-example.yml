# ============================================================
# 单数据源配置示例（默认）
# ============================================================
# 适用于大多数项目，只需连接一个数据库

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/your_database?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
    
    # Druid 连接池配置
    druid:
      initial-size: 5                    # 初始化连接数
      min-idle: 5                        # 最小空闲连接数
      max-active: 20                     # 最大活跃连接数
      max-wait: 60000                    # 获取连接最大等待时间（毫秒）
      time-between-eviction-runs-millis: 60000    # 检测间隔时间
      min-evictable-idle-time-millis: 300000      # 最小空闲时间
      validation-query: SELECT 1         # 连接有效性检测SQL
      test-while-idle: true              # 空闲时检测
      test-on-borrow: false              # 获取时不检测
      test-on-return: false              # 归还时不检测
      # 开启监控页面（可选）
      # stat-view-servlet:
      #   enabled: true
      #   url-pattern: /druid/*
      #   login-username: admin
      #   login-password: admin
