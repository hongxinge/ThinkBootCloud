spring:
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8080
      eager: true

thinkboot:
  sentinel:
    enabled: true
    dashboard: localhost:8080
    eager: true
    datasource:
      nacos:
        enabled: true
        server-addr: localhost:8848
        namespace: dev
        groupId: SENTINEL_GROUP
        data-id: ${spring.application.name}-sentinel-rules
        rule-type: flow
