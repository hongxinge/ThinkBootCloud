# ThinkBoot Auth 默认配置
# 此文件提供框架默认配置，开发者可在自己的 application.yml 中覆盖
thinkboot:
  auth:
    jwt:
      # JWT密钥（Base64编码，至少32位）
      # 生产环境请通过环境变量 JWT_SECRET 覆盖
      # 与 Gateway 共享同一环境变量，一处配置全局生效
      secret: ${JWT_SECRET:dGhpbmstYm9vdC1jbG91ZC1qd3Qtc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRz}
      # Token有效期（2小时）
      expiration: ${JWT_EXPIRATION:7200000}
      # 刷新Token有效期（7天）
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
